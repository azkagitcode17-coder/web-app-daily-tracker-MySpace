<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <title>MySpace — Login</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌙</text></svg>"/>

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Mono:wght@700&display=swap" rel="stylesheet"/>

  <!-- Firebase Auth (module) -->
  <script type="module">
    import { initializeApp }                           from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore }                            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import {
      getAuth, createUserWithEmailAndPassword,
      signInWithEmailAndPassword, onAuthStateChanged,
      sendPasswordResetEmail, updateProfile
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // =============================================
    // ⚠️  GANTI DENGAN KONFIGURASI FIREBASE ANDA  ⚠️
    //     (sama persis dengan js/firebase.js)
    // =============================================
    const firebaseConfig = {
    apiKey: "AIzaSyBtjH0SzFAsvC7am6rVCBjfV2haxou3rf4",
    authDomain: "web-app-daily-tracker.firebaseapp.com",
    projectId: "web-app-daily-tracker",
    storageBucket: "web-app-daily-tracker.firebasestorage.app",
    messagingSenderId: "831073695929",
    appId: "1:831073695929:web:2fe5e9e45f552431a40368"
  };
    // =============================================

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Jika sudah login → langsung ke app
    onAuthStateChanged(auth, user => {
      if (user) window.location.replace('index.html');
    });

    // Expose auth ke global untuk dipakai fungsi di bawah
    window._auth = auth;
    window._authFn = {
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      sendPasswordResetEmail,
      updateProfile
    };
  </script>

  <style>
    /* ---- VARIABLES ---- */
    :root {
      --bg:       #0d0f14;
      --bg-card:  #1c2030;
      --border:   #2a3050;
      --text:     #e8eaf6;
      --muted:    #8892b0;
      --accent:   #6c8fff;
      --accent-2: #a78bfa;
      --success:  #34d399;
      --danger:   #f87171;
      --warning:  #fbbf24;
      --font:     'Plus Jakarta Sans', sans-serif;
      --mono:     'Space Mono', monospace;
    }
    [data-theme="light"] {
      --bg:       #f0f2f8;
      --bg-card:  #ffffff;
      --border:   #dce0f0;
      --text:     #1a1f36;
      --muted:    #4a5580;
      --accent:   #4f6ef7;
      --accent-2: #7c3aed;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background 0.3s, color 0.3s;
      position: relative;
      overflow: hidden;
    }

    /* ---- BACKGROUND BLOB ---- */
    body::before {
      content: '';
      position: fixed; top: -200px; right: -200px;
      width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(108,143,255,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed; bottom: -200px; left: -200px;
      width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(167,139,250,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ---- CARD ---- */
    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px 40px;
      width: 100%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      position: relative; z-index: 1;
      animation: slideUp 0.4s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---- LOGO ---- */
    .auth-logo {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .logo-text {
      font-weight: 800; font-size: 20px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* ---- TABS ---- */
    .auth-tabs {
      display: flex; gap: 4px;
      background: var(--bg);
      border-radius: 12px; padding: 4px;
      margin-bottom: 24px;
    }
    .tab-btn {
      flex: 1; padding: 8px;
      border-radius: 9px; border: none;
      font-family: var(--font); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      background: transparent; color: var(--muted);
    }
    .tab-btn.active {
      background: var(--bg-card);
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    /* ---- FORM ---- */
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--muted); margin-bottom: 6px;
    }
    .input-wrap { position: relative; }
    .input-wrap i {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%); color: var(--muted); font-size: 15px;
      pointer-events: none;
    }
    .form-input {
      width: 100%; padding: 10px 12px 10px 38px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-family: var(--font); font-size: 13px;
      outline: none; transition: border 0.2s;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input.no-icon { padding-left: 12px; }

    /* Eye toggle untuk password */
    .eye-toggle {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      cursor: pointer; color: var(--muted); font-size: 15px;
      background: none; border: none; padding: 0;
      transition: color 0.2s;
    }
    .eye-toggle:hover { color: var(--accent); }
    .form-input.has-eye { padding-right: 38px; }

    /* ---- STRENGTH BAR ---- */
    .strength-wrap { margin-top: 6px; display: none; }
    .strength-bar {
      height: 4px; border-radius: 99px;
      background: var(--border); overflow: hidden; margin-bottom: 4px;
    }
    .strength-fill {
      height: 100%; border-radius: 99px;
      transition: width 0.3s, background 0.3s;
      width: 0%;
    }
    .strength-label { font-size: 11px; color: var(--muted); }

    /* ---- BUTTON ---- */
    .btn-submit {
      width: 100%; padding: 11px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white; border: none; border-radius: 10px;
      font-family: var(--font); font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 4px;
    }
    .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(108,143,255,0.35); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-submit .spinner {
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.7s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- DIVIDER ---- */
    .divider {
      display: flex; align-items: center; gap: 12px;
      color: var(--muted); font-size: 12px; margin: 16px 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* ---- LINK ---- */
    .auth-link {
      color: var(--accent); font-size: 13px; font-weight: 600;
      text-decoration: none; cursor: pointer; background: none; border: none;
      font-family: var(--font);
    }
    .auth-link:hover { text-decoration: underline; }

    /* ---- ALERT ---- */
    .auth-alert {
      padding: 10px 14px; border-radius: 10px;
      font-size: 13px; font-weight: 500;
      display: none; align-items: center; gap: 8px;
      margin-bottom: 14px;
    }
    .auth-alert.error   { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--danger); }
    .auth-alert.success { background: rgba(52,211,153,0.1);  border: 1px solid rgba(52,211,153,0.3);  color: var(--success); }
    .auth-alert.show    { display: flex; }

    /* ---- THEME TOGGLE ---- */
    #theme-toggle-login {
      position: fixed; top: 16px; right: 16px;
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--bg-card); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--muted); font-size: 16px;
      transition: all 0.2s; z-index: 10;
    }
    #theme-toggle-login:hover { background: var(--accent); color: white; border-color: var(--accent); }

    /* ---- FORGOT PASSWORD PANEL ---- */
    #forgot-panel { display: none; }

    /* ---- FOOTER ---- */
    .auth-footer {
      text-align: center; margin-top: 20px;
      font-size: 12px; color: var(--muted);
    }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 480px) {
      .auth-card { padding: 28px 24px; border-radius: 20px; }
    }
  </style>
</head>
<body>

  <!-- Theme Toggle -->
  <div id="theme-toggle-login" title="Toggle tema">
    <i class="bi bi-moon-stars-fill" id="theme-icon-login"></i>
  </div>

  <!-- Auth Card -->
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="logo-icon">🌙</div>
      <span class="logo-text">MySpace</span>
    </div>

    <!-- Alert -->
    <div class="auth-alert" id="auth-alert">
      <i class="bi bi-exclamation-circle-fill"></i>
      <span id="auth-alert-msg"></span>
    </div>

    <!-- ======== PANEL LOGIN & REGISTER ======== -->
    <div id="main-panel">

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="tab-btn active" id="tab-login"    onclick="switchTab('login')">Masuk</button>
        <button class="tab-btn"        id="tab-register" onclick="switchTab('register')">Daftar</button>
      </div>

      <!-- ---- FORM LOGIN ---- -->
      <form id="form-login" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="input-wrap">
            <i class="bi bi-envelope-fill"></i>
            <input class="form-input" type="email" id="login-email"
              placeholder="nama@email.com" autocomplete="email" required/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" style="display:flex;justify-content:space-between;">
            <span>Password</span>
            <button type="button" class="auth-link" onclick="showForgot()" style="font-size:11px;">
              Lupa password?
            </button>
          </label>
          <div class="input-wrap">
            <i class="bi bi-lock-fill"></i>
            <input class="form-input has-eye" type="password" id="login-password"
              placeholder="Masukkan password" autocomplete="current-password" required/>
            <button type="button" class="eye-toggle" onclick="toggleEye('login-password', this)">
              <i class="bi bi-eye-fill"></i>
            </button>
          </div>
        </div>
        <button class="btn-submit" type="submit" id="btn-login">
          <div class="spinner" id="spin-login"></div>
          <i class="bi bi-box-arrow-in-right" id="icon-login"></i>
          <span id="text-login">Masuk</span>
        </button>
      </form>

      <!-- ---- FORM REGISTER ---- -->
      <form id="form-register" onsubmit="handleRegister(event)" style="display:none;">
        <div class="form-group">
          <label class="form-label">Nama Lengkap</label>
          <div class="input-wrap">
            <i class="bi bi-person-fill"></i>
            <input class="form-input" type="text" id="reg-name"
              placeholder="Nama kamu" autocomplete="name" required/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="input-wrap">
            <i class="bi bi-envelope-fill"></i>
            <input class="form-input" type="email" id="reg-email"
              placeholder="nama@email.com" autocomplete="email" required/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-wrap">
            <i class="bi bi-lock-fill"></i>
            <input class="form-input has-eye" type="password" id="reg-password"
              placeholder="Minimal 6 karakter"
              oninput="checkStrength(this.value)"
              autocomplete="new-password" required/>
            <button type="button" class="eye-toggle" onclick="toggleEye('reg-password', this)">
              <i class="bi bi-eye-fill"></i>
            </button>
          </div>
          <!-- Password strength bar -->
          <div class="strength-wrap" id="strength-wrap">
            <div class="strength-bar">
              <div class="strength-fill" id="strength-fill"></div>
            </div>
            <span class="strength-label" id="strength-label"></span>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Konfirmasi Password</label>
          <div class="input-wrap">
            <i class="bi bi-shield-lock-fill"></i>
            <input class="form-input has-eye" type="password" id="reg-confirm"
              placeholder="Ulangi password"
              autocomplete="new-password" required/>
            <button type="button" class="eye-toggle" onclick="toggleEye('reg-confirm', this)">
              <i class="bi bi-eye-fill"></i>
            </button>
          </div>
        </div>
        <button class="btn-submit" type="submit" id="btn-register">
          <div class="spinner" id="spin-register"></div>
          <i class="bi bi-person-plus-fill" id="icon-register"></i>
          <span id="text-register">Buat Akun</span>
        </button>
      </form>

    </div><!-- /main-panel -->

    <!-- ======== PANEL LUPA PASSWORD ======== -->
    <div id="forgot-panel">
      <div style="margin-bottom:20px;">
        <div style="font-weight:800;font-size:16px;margin-bottom:6px;">
          <i class="bi bi-key-fill" style="color:var(--accent);margin-right:6px;"></i>Reset Password
        </div>
        <div style="font-size:13px;color:var(--muted);">
          Masukkan email kamu, kami akan kirim link reset password.
        </div>
      </div>
      <form onsubmit="handleForgot(event)">
        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="input-wrap">
            <i class="bi bi-envelope-fill"></i>
            <input class="form-input" type="email" id="forgot-email"
              placeholder="nama@email.com" required/>
          </div>
        </div>
        <button class="btn-submit" type="submit" id="btn-forgot">
          <div class="spinner" id="spin-forgot"></div>
          <i class="bi bi-send-fill" id="icon-forgot"></i>
          <span id="text-forgot">Kirim Link Reset</span>
        </button>
      </form>
      <div style="text-align:center;margin-top:16px;">
        <button class="auth-link" onclick="showMain()">
          <i class="bi bi-arrow-left"></i> Kembali ke login
        </button>
      </div>
    </div><!-- /forgot-panel -->

    <!-- Footer -->
    <div class="auth-footer">
      MySpace &copy; 2026 · Ruang Pribadiku
      <br/>
      <br/>
      Dibuat dengan ❤️ oleh <a href="https://www.instagram.com/kaav17_?igsh=cm96dzF2MmpwcDN5" target="_blank"><strong>Azka IF-ELSE</strong></a>
    </div>

  </div><!-- /auth-card -->

  <script>
  // =================== THEME ===================
  const savedTheme = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
  const updateLoginThemeIcon = () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.getElementById('theme-icon-login').className =
      isDark ? 'bi bi-sun-fill' : 'bi bi-moon-stars-fill';
  };
  updateLoginThemeIcon();
  document.getElementById('theme-toggle-login').addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateLoginThemeIcon();
  });

  // =================== TAB SWITCH ===================
  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('tab-login').classList.toggle('active', isLogin);
    document.getElementById('tab-register').classList.toggle('active', !isLogin);
    document.getElementById('form-login').style.display    = isLogin ? 'block' : 'none';
    document.getElementById('form-register').style.display = isLogin ? 'none'  : 'block';
    clearAlert();
  }

  // =================== PANEL SWITCH ===================
  function showForgot() {
    document.getElementById('main-panel').style.display   = 'none';
    document.getElementById('forgot-panel').style.display = 'block';
    clearAlert();
  }
  function showMain() {
    document.getElementById('main-panel').style.display   = 'block';
    document.getElementById('forgot-panel').style.display = 'none';
    clearAlert();
  }

  // =================== EYE TOGGLE ===================
  function toggleEye(inputId, btn) {
    const input = document.getElementById(inputId);
    const isPass = input.type === 'password';
    input.type = isPass ? 'text' : 'password';
    btn.querySelector('i').className = isPass ? 'bi bi-eye-slash-fill' : 'bi bi-eye-fill';
  }

  // =================== PASSWORD STRENGTH ===================
  function checkStrength(val) {
    const wrap = document.getElementById('strength-wrap');
    const fill = document.getElementById('strength-fill');
    const lbl  = document.getElementById('strength-label');
    wrap.style.display = val.length ? 'block' : 'none';
    let score = 0;
    if (val.length >= 6)  score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const levels = [
      { w: '20%', c: '#f87171', t: 'Sangat Lemah' },
      { w: '40%', c: '#fb923c', t: 'Lemah' },
      { w: '60%', c: '#fbbf24', t: 'Cukup' },
      { w: '80%', c: '#34d399', t: 'Kuat' },
      { w: '100%',c: '#10b981', t: 'Sangat Kuat' },
    ];
    const lvl = levels[Math.max(0, score - 1)];
    fill.style.width      = lvl.w;
    fill.style.background = lvl.c;
    lbl.textContent       = lvl.t;
    lbl.style.color       = lvl.c;
  }

  // =================== ALERT ===================
  function showAlert(msg, type = 'error') {
    const el  = document.getElementById('auth-alert');
    const txt = document.getElementById('auth-alert-msg');
    el.className  = `auth-alert ${type} show`;
    el.querySelector('i').className =
      type === 'error' ? 'bi bi-exclamation-circle-fill' : 'bi bi-check-circle-fill';
    txt.textContent = msg;
  }
  function clearAlert() {
    document.getElementById('auth-alert').className = 'auth-alert';
  }

  // =================== LOADING STATE ===================
  function setLoading(btnId, spinId, iconId, textId, loading, label = '') {
    document.getElementById(btnId).disabled     = loading;
    document.getElementById(spinId).style.display = loading ? 'block' : 'none';
    document.getElementById(iconId).style.display = loading ? 'none'  : 'inline';
    if (label) document.getElementById(textId).textContent = loading ? 'Memproses...' : label;
  }

  // =================== FIREBASE ERROR MAP ===================
  function firebaseError(code) {
    const map = {
      'auth/user-not-found':       'Email tidak terdaftar.',
      'auth/wrong-password':       'Password salah.',
      'auth/invalid-credential':   'Email atau password salah.',
      'auth/email-already-in-use': 'Email sudah digunakan, coba login.',
      'auth/weak-password':        'Password terlalu lemah (min 6 karakter).',
      'auth/invalid-email':        'Format email tidak valid.',
      'auth/too-many-requests':    'Terlalu banyak percobaan. Coba lagi nanti.',
      'auth/network-request-failed': 'Gagal konek ke server. Cek koneksi internet.',
    };
    return map[code] || 'Terjadi kesalahan. Coba lagi.';
  }

  // =================== HANDLE LOGIN ===================
  async function handleLogin(e) {
    e.preventDefault();
    clearAlert();
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    // Pastikan Firebase Auth sudah siap
    if (!window._auth) return showAlert('Menghubungkan ke server, coba sebentar lagi...');

    setLoading('btn-login', 'spin-login', 'icon-login', 'text-login', true, 'Masuk');
    try {
      await window._authFn.signInWithEmailAndPassword(window._auth, email, password);
      showAlert('Login berhasil! Mengalihkan...', 'success');
      setTimeout(() => window.location.replace('index.html'), 800);
    } catch (err) {
      showAlert(firebaseError(err.code));
      setLoading('btn-login', 'spin-login', 'icon-login', 'text-login', false, 'Masuk');
    }
  }

  // =================== HANDLE REGISTER ===================
  async function handleRegister(e) {
    e.preventDefault();
    clearAlert();
    const name     = document.getElementById('reg-name').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const confirm  = document.getElementById('reg-confirm').value;

    if (password !== confirm) return showAlert('Password dan konfirmasi tidak cocok.');
    if (password.length < 6)  return showAlert('Password minimal 6 karakter.');
    if (!window._auth)        return showAlert('Menghubungkan ke server, coba sebentar lagi...');

    setLoading('btn-register', 'spin-register', 'icon-register', 'text-register', true, 'Buat Akun');
    try {
      const cred = await window._authFn.createUserWithEmailAndPassword(window._auth, email, password);
      // Simpan nama di profil Firebase
      await window._authFn.updateProfile(cred.user, { displayName: name });
      showAlert('Akun berhasil dibuat! Mengalihkan...', 'success');
      setTimeout(() => window.location.replace('index.html'), 800);
    } catch (err) {
      showAlert(firebaseError(err.code));
      setLoading('btn-register', 'spin-register', 'icon-register', 'text-register', false, 'Buat Akun');
    }
  }

  // =================== HANDLE LUPA PASSWORD ===================
  async function handleForgot(e) {
    e.preventDefault();
    clearAlert();
    const email = document.getElementById('forgot-email').value.trim();
    if (!window._auth) return showAlert('Menghubungkan ke server, coba sebentar lagi...');

    setLoading('btn-forgot', 'spin-forgot', 'icon-forgot', 'text-forgot', true, 'Kirim Link Reset');
    try {
      await window._authFn.sendPasswordResetEmail(window._auth, email);
      showAlert('Link reset dikirim! Cek email kamu (termasuk folder spam).', 'success');
      setLoading('btn-forgot', 'spin-forgot', 'icon-forgot', 'text-forgot', false, 'Kirim Link Reset');
    } catch (err) {
      showAlert(firebaseError(err.code));
      setLoading('btn-forgot', 'spin-forgot', 'icon-forgot', 'text-forgot', false, 'Kirim Link Reset');
    }
  }
  </script>
</body>
