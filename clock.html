<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;max-width:800px;margin:0 auto;">
  <div class="card" style="text-align:center;padding:32px;">
    <div class="tz-label">WIB — Waktu Indonesia Barat</div>
    <div style="font-size:11px;color:var(--text-muted);margin-bottom:12px;">UTC+7 · Jakarta, Bandung, Surabaya</div>
    <div class="clock-display" id="clock-wib">--:--:--</div>
    <div style="margin-top:8px;font-size:13px;color:var(--text-secondary);" id="date-wib"></div>
  </div>
  <div class="card" style="text-align:center;padding:32px;">
    <div class="tz-label">WITA — Waktu Indonesia Tengah</div>
    <div style="font-size:11px;color:var(--text-muted);margin-bottom:12px;">UTC+8 · Makassar, Bali, Lombok</div>
    <div class="clock-display" id="clock-wita">--:--:--</div>
    <div style="margin-top:8px;font-size:13px;color:var(--text-secondary);" id="date-wita"></div>
  </div>
  <div class="card" style="text-align:center;padding:32px;">
    <div class="tz-label">WIT — Waktu Indonesia Timur</div>
    <div style="font-size:11px;color:var(--text-muted);margin-bottom:12px;">UTC+9 · Ambon, Jayapura, Papua</div>
    <div class="clock-display" id="clock-wit">--:--:--</div>
    <div style="margin-top:8px;font-size:13px;color:var(--text-secondary);" id="date-wit"></div>
  </div>
</div>
