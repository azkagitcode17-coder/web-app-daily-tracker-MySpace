<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
  <div style="font-size:14px;font-weight:600;color:var(--text-secondary);" id="today-date-label"></div>
  <div style="display:flex;gap:8px;">
    <button class="btn btn-ghost btn-sm" id="mark-holiday-btn">
      <i class="bi bi-star-fill"></i> Tandai Hari Libur
    </button>
    <button class="btn btn-primary btn-sm" id="add-schedule-btn">
      <i class="bi bi-plus-lg"></i> Tambah Jadwal
    </button>
  </div>
</div>

<div style="display:grid;grid-template-columns:1fr auto;gap:16px;align-items:start;">
  <div>
    <!-- Holiday banner -->
    <div id="holiday-banner" style="display:none;background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);border-radius:12px;padding:12px 16px;margin-bottom:12px;font-size:13px;color:var(--warning);display:flex;align-items:center;gap:8px;">
      <i class="bi bi-star-fill"></i>
      <span id="holiday-text">Hari ini adalah hari libur / ada acara penting!</span>
      <button class="btn btn-ghost btn-sm" id="unmark-holiday-btn" style="margin-left:auto;">Hapus</button>
    </div>

    <div id="schedule-list">
      <div style="text-align:center;color:var(--text-muted);padding:40px;font-size:13px;">
        <i class="bi bi-calendar-check" style="font-size:32px;display:block;margin-bottom:8px;"></i>
        Belum ada jadwal hari ini
      </div>
    </div>
  </div>

  <div style="min-width:160px;text-align:center;">
    <div class="card" style="display:inline-block;padding:16px;">
      <div class="card-title" style="justify-content:center;margin-bottom:8px;"><i class="bi bi-pie-chart-fill"></i> Progress</div>
      <div class="donut-wrap">
        <canvas id="schedule-donut" width="140" height="140"></canvas>
        <div class="donut-center">
          <div class="pct" id="schedule-pct">0%</div>
          <div class="lbl">selesai</div>
        </div>
      </div>
    </div>
  </div>
</div>
