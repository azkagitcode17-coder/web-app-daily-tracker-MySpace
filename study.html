<div class="card" style="margin-bottom:16px;">
  <div class="card-title"><i class="bi bi-plus-circle-fill"></i> Tambah Sesi Belajar</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
    <div class="form-group">
      <label class="form-label">Nama Pelajaran / Topik</label>
      <input class="form-input" id="study-name" placeholder="Contoh: Matematika Bab 3"/>
    </div>
    <div class="form-group">
      <label class="form-label">Target Waktu (menit, kelipatan 30)</label>
      <select class="form-select" id="study-duration">
        <option value="30">30 menit</option>
        <option value="60">60 menit</option>
        <option value="90">90 menit</option>
        <option value="120">120 menit</option>
        <option value="150">150 menit</option>
        <option value="180">180 menit</option>
      </select>
    </div>
  </div>
  <button class="btn btn-primary" id="study-add-btn">
    <i class="bi bi-play-circle-fill"></i> Tambah Sesi
  </button>
</div>

<div id="study-list">
  <div style="text-align:center;color:var(--text-muted);padding:40px;font-size:13px;">
    <i class="bi bi-book" style="font-size:32px;display:block;margin-bottom:8px;"></i>
    Belum ada sesi belajar
  </div>
</div>
