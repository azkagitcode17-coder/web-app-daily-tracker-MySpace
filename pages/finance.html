<!-- ============================================================
     pages/finance.html — Halaman Finance Tracker
     ============================================================ -->
<div class="page" id="page-finance">

  <!-- Stat Cards -->
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px;">
    <div class="stat-card">
      <div class="stat-label">Pemasukan</div>
      <div class="stat-value" id="total-income" style="color:var(--success)">Rp 0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pengeluaran</div>
      <div class="stat-value" id="total-expense" style="color:var(--danger)">Rp 0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Saldo</div>
      <div class="stat-value" id="total-balance">Rp 0</div>
    </div>
  </div>

  <!-- Chart Garis -->
  <div class="card" style="margin-bottom:16px;">
    <div class="card-title"><i class="bi bi-graph-up-arrow"></i> Grafik Keuangan 7 Hari Terakhir</div>
    <canvas id="finance-chart" height="160"></canvas>
  </div>

  <!-- Form + Riwayat -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">

    <!-- Form Tambah Transaksi -->
    <div class="card">
      <div class="card-title"><i class="bi bi-plus-circle-fill"></i> Tambah Transaksi</div>
      <div class="form-group">
        <label class="form-label">Deskripsi</label>
        <input class="form-input" id="fin-desc" placeholder="Nama transaksi..."/>
      </div>
      <div class="form-group">
        <label class="form-label">Jumlah (Rp)</label>
        <input class="form-input" id="fin-amount" type="number" placeholder="0"/>
      </div>
      <div class="form-group">
        <label class="form-label">Kategori</label>
        <input class="form-input" id="fin-cat" placeholder="Makan, Transport, dll..."/>
      </div>
      <div class="form-group">
        <label class="form-label">Tipe</label>
        <select class="form-select" id="fin-type">
          <option value="income">Pemasukan</option>
          <option value="expense">Pengeluaran</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Tanggal</label>
        <input class="form-input" id="fin-date" type="date"/>
      </div>
      <button class="btn btn-primary" id="fin-add-btn" style="width:100%">
        <i class="bi bi-plus-lg"></i> Tambah Transaksi
      </button>
    </div>

    <!-- Riwayat Transaksi -->
    <div class="card">
      <div class="card-title"><i class="bi bi-clock-history"></i> Riwayat Transaksi</div>
      <div id="finance-list" style="max-height:360px;overflow-y:auto;">
        <div style="text-align:center;color:var(--text-muted);padding:20px;font-size:13px;">Belum ada transaksi</div>
      </div>
    </div>

  </div>
</div>
