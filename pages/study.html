<!-- ============================================================
     pages/study.html — Halaman Monitoring Belajar
     ============================================================ -->
<div class="page" id="page-study">
  <div style="display:grid;grid-template-columns:320px 1fr;gap:16px;align-items:start;">

    <!-- Kolom Kiri: Form Tambah + Statistik -->
    <div class="card" style="position:sticky;top:80px;">
      <div class="card-title"><i class="bi bi-plus-circle-fill"></i> Tambah Sesi Belajar</div>
      <div class="form-group">
        <label class="form-label">Nama Pelajaran / Topik</label>
        <input class="form-input" id="study-name" placeholder="Contoh: Matematika Bab 3"/>
      </div>
      <div class="form-group">
        <label class="form-label">Target Waktu (kelipatan 30 menit)</label>
        <select class="form-select" id="study-duration">
          <option value="30">30 menit</option>
          <option value="60">60 menit</option>
          <option value="90">90 menit</option>
          <option value="120">120 menit</option>
          <option value="150">150 menit</option>
          <option value="180">180 menit</option>
        </select>
      </div>
      <button class="btn btn-primary" id="study-add-btn" style="width:100%">
        <i class="bi bi-play-circle-fill"></i> Tambah Sesi
      </button>

      <!-- Statistik Berhasil / Gagal -->
      <div class="divider"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div style="background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.2);border-radius:10px;padding:10px;text-align:center;">
          <div style="font-size:20px;font-weight:800;color:var(--success);" id="study-stat-done">0</div>
          <div style="font-size:11px;color:var(--text-muted);">Berhasil</div>
        </div>
        <div style="background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);border-radius:10px;padding:10px;text-align:center;">
          <div style="font-size:20px;font-weight:800;color:var(--danger);" id="study-stat-fail">0</div>
          <div style="font-size:11px;color:var(--text-muted);">Gagal</div>
        </div>
      </div>
    </div>

    <!-- Kolom Kanan: Daftar Sesi -->
    <div>
      <div style="font-weight:700;font-size:14px;margin-bottom:12px;color:var(--text-secondary);">
        <i class="bi bi-list-ul" style="color:var(--accent);margin-right:6px;"></i>Daftar Sesi Belajar
      </div>
      <div id="study-list">
        <div style="text-align:center;color:var(--text-muted);padding:40px;font-size:13px;">
          <i class="bi bi-book" style="font-size:32px;display:block;margin-bottom:8px;"></i>
          Belum ada sesi belajar
        </div>
      </div>
    </div>

  </div>
</div>
